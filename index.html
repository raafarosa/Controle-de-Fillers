<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="One Piece">
    <meta name="mobile-web-app-capable" content="yes">

    <title>One Piece Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="icone.ico?v=1">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="app-container">
        <div class="stats-panel">
            <div class="title-area">
                <div>
                    <h1>One Piece Tracker</h1>
                </div>
            </div>

            <div class="stats-cards" id="statsArea">
                <div class="stat">Episódios Assistidos: <span id="watchedCount">---</span></div>
                <div class="stat">Faltam: <span id="remainingCount">---</span></div>
                <div class="stat">Horas Assistidas: <span id="hoursWatched">---</span></div>
                <div class="stat">Horas Restantes: <span id="totalRelevant">---</span></div>
                <div class="stat">Ultimo episódio em: <span id="finishPrediction">---</span></div>
                <div class="stat">Assistidos hoje: <span id="todayCount">---</span></div>
            </div>

            <div class="action-buttons" style="margin-top: 1rem;">
                <button class="pirate-btn" id="goToLastWatchedBtn">
                    Ir para o último assistido!
                </button>
            </div>
        </div>

        <div class="json-option">
            <span>📁 Fonte:</span>
            <select id="dataSourceSelect">
                <option value="sheet" selected>📄 Google Sheets</option>
                <option value="external">📄 matriz.json</option>
                <option value="hardcoded">📝 Hardcoded</option>
            </select>
            <span class="file-status" id="fileStatus">✅ Carregando...</span>
        </div>

        <div class="filter-bar">
            <div class="filter-group">
                <button class="filter-btn active-filter" data-filter="all">📋 Todos</button>
                <button class="filter-btn" data-filter="Manga Canon">📖 Manga</button>
                <button class="filter-btn" data-filter="Mixed Canon/Filler">🔄 Mixed</button>
                <button class="filter-btn" data-filter="Anime Canon">✨ Anime</button>
                <button class="filter-btn" data-filter="Filler">📺 Filler</button>
            </div>
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Buscar por número..."
                autocomplete="off">
        </div>

        <div class="info-bar">
            <div class="episode-count" id="displayCount"></div>
            <div style="font-size:0.6rem;">✔️ Toque no checkbox</div>
        </div>

        <div id="cardsContainer" class="cards-container"></div>

        <div class="table-wrapper">
            <table id="episodeTable">
                <thead>
                    <tr>
                        <th>Arco</th>
                        <th>EP</th>
                        <th>Tipo</th>
                        <th>Data</th>
                        <th>Assistido</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
    <button id="backToTopBtn" class="back-to-top">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="m18 15-6-6-6 6" />
        </svg>
    </button>

    <script src="assets/js/main.js" defer></script>
</body>

</html>
